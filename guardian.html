<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARTEMIS | NETWORK OPTIMIZER</title>
    <style>
        body { background: #050505; color: #fff; font-family: "Segoe UI", sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .core-virtual { width: 400px; height: 400px; border: 2px solid #00f3ff; border-radius: 50%; position: relative; animation: spin 60s linear infinite; box-shadow: 0 0 30px #00f3ff; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .optimizer-panel { position: absolute; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(100px); padding: 40px; border-radius: 20px; border: 1px solid rgba(0, 243, 255, 0.3); text-align: center; }
        h1 { color: #00f3ff; letter-spacing: 5px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="core-virtual"></div>
    <div class="optimizer-panel">
        <h1>ARTEMIS 9.5</h1>
        <p>SYSTEM HARDENED. NETWORK OPTIMIZED.</p>
        <div style="color: #00f3ff; font-weight: bold;">CORE STATUS: ACTIVE</div>
    </div>
</body>
</html>
